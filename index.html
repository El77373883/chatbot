<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi IA</title>
<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
border-bottom:1px solid #1e293b;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:70%;
padding:12px;
margin:10px 0;
border-radius:10px;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1e293b;
}

#input-area{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

button{
margin-left:10px;
padding:10px 20px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>Mi IA</header>

<div id="chat"></div>

<div id="input-area">
<input id="msg" placeholder="Escribe tu mensaje...">
<button onclick="send()">Enviar</button>
</div>

<script>

function send(){

let msg=document.getElementById("msg").value
if(msg=="") return

let chat=document.getElementById("chat")

let user=document.createElement("div")
user.className="message user"
user.innerText=msg
chat.appendChild(user)

let bot=document.createElement("div")
bot.className="message bot"

if(msg.toLowerCase()=="hola"){
bot.innerText="Hola 👋 ¿en qué puedo ayudarte?"
}else{
bot.innerText="Estoy aprendiendo. Pronto seré más inteligente."
}

chat.appendChild(bot)

document.getElementById("msg").value=""
chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
