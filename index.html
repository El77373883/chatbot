<script>
// ==================== DATABASE.JS ====================
window.NexusDatabase = {

            respuestas: [

// ==================== BRAIN.JS con generación de archivos ====================
const NexusBrain = {
    analyze: function(input, modelId) {
        var msg = input.toLowerCase().trim();
        var db = window.NexusDatabase;
        var respuestaFinal = "";
        var colorModo = "none";

        // 1. MODOS VISUALES
        if (msg.includes("hacker")) {
            colorModo = "hacker";
            respuestaFinal = "Modo Hacker activado. Interfaz reconfigurada.";
            return { text: this.formatResponse(modelId, respuestaFinal), action: colorModo };
        } else if (msg.includes("epico")) {
            colorModo = "epico";
            respuestaFinal = "Modo Épico activado. Potencia al máximo.";
            return { text: this.formatResponse(modelId, respuestaFinal), action: colorModo };
        } else if (msg.includes("normal") || msg.includes("resetear")) {
            colorModo = "normal";
            respuestaFinal = "Modo Normal restaurado. Estilo original.";
            return { text: this.formatResponse(modelId, respuestaFinal), action: colorModo };
        }

        // 2. GENERACIÓN DE ARCHIVOS (si el usuario lo pide explícitamente)
        const downloadKeywords = ["genera un archivo", "descargar archivo", "crea un archivo", "dame el código en un archivo", "exporta", "guarda como archivo"];
        let isDownloadRequest = false;
        let downloadContent = "";
        let downloadFilename = "archivo.txt";
        let downloadMime = "text/plain";

        for (let kw of downloadKeywords) {
            if (msg.includes(kw)) {
                isDownloadRequest = true;
                // Extraer contenido después de la palabra clave
                let contentStart = input.indexOf(kw) + kw.length;
                let rawContent = input.substring(contentStart).trim();
                if (rawContent === "") {
                    respuestaFinal = "No especificaste el contenido del archivo. Escribe algo como: 'genera un archivo con este código: ...'";
                } else {
                    // Intentar detectar extensión por contexto
                    if (rawContent.includes("function") || rawContent.includes("var") || rawContent.includes("const") || rawContent.includes("console.log")) {
                        downloadFilename = "codigo.js";
                        downloadMime = "text/javascript";
                    } else if (rawContent.includes("<html>") || rawContent.includes("<div>")) {
                        downloadFilename = "pagina.html";
                        downloadMime = "text/html";
                    } else if (rawContent.includes("import") || rawContent.includes("def ")) {
                        downloadFilename = "script.py";
                        downloadMime = "text/x-python";
                    } else {
                        downloadFilename = "documento.txt";
                        downloadMime = "text/plain";
                    }
                    downloadContent = rawContent;
                    respuestaFinal = `He preparado el archivo **${downloadFilename}** con el contenido solicitado. Haz clic en el botón para descargarlo.`;
                }
                break;
            }
        }

        if (isDownloadRequest) {
            if (respuestaFinal.includes("No especificaste")) {
                return { text: this.formatResponse(modelId, respuestaFinal), action: colorModo };
            } else {
                return {
                    text: this.formatResponse(modelId, respuestaFinal),
                    action: colorModo,
                    download: {
                        filename: downloadFilename,
                        content: downloadContent,
                        mime: downloadMime
                    }
                };
            }
        }

        // 3. BÚSQUEDA NORMAL EN DB
        var encontrado = false;
        for (var cat in db.categorias) {
            var categoria = db.categorias[cat];
            for (var i = 0; i < categoria.claves.length; i++) {
                if (msg.includes(categoria.claves[i])) {
                    if (cat === "saludos") {
                        var hora = new Date().getHours();
                        var momento = (hora >= 6 && hora < 12) ? "manana" : (hora >= 12 && hora < 19) ? "tarde" : "noche";
                        var respuestasMomento = categoria.respuestas[momento];
                        respuestaFinal = respuestasMomento[Math.floor(Math.random() * respuestasMomento.length)];
                    } else {
                        respuestaFinal = categoria.respuestas[Math.floor(Math.random() * categoria.respuestas.length)];
                    }
                    encontrado = true;
                    break;
                }
            }
            if (encontrado) break;
        }

        if (!respuestaFinal) {
            respuestaFinal = db.default[Math.floor(Math.random() * db.default.length)];
        }

        return { text: this.formatResponse(modelId, respuestaFinal), action: colorModo };
    },

    formatResponse: function(modelId, text) {
        return `<span style="color: var(--primary); font-weight: 600;">[${modelId.toUpperCase()}]</span><br><br>${text}`;
    }
};

window.NexusBrain = NexusBrain;

// ==================== GESTIÓN DE MODELOS Y CONVERSACIONES ====================
let activeModel = "Nexus V5 PRO";
let modelos = [
    "Nexus V5 PRO",
    "Nexus V4 ULTRA",
    "Nexus V3 Lite",
    "Core Engine X",
    "CyberVision 2.0"
];

let conversations = [];
let currentConvId = null;
let currentMessages = [];

// Cargar datos guardados
function loadStorage() {
    const savedModels = localStorage.getItem('nexus_models');
    if (savedModels) modelos = JSON.parse(savedModels);
    
    const savedConvs = localStorage.getItem('nexus_conversations');
    if (savedConvs) {
        conversations = JSON.parse(savedConvs);
        const lastId = localStorage.getItem('nexus_current_conv');
        if (lastId && conversations.find(c => c.id === lastId)) {
            currentConvId = lastId;
        } else if (conversations.length > 0) {
            currentConvId = conversations[0].id;
        } else {
            newConversation();
        }
    } else {
        newConversation();
    }
    
    if (currentConvId) {
        const conv = conversations.find(c => c.id === currentConvId);
        if (conv) currentMessages = conv.messages;
        else currentMessages = [];
    }
    renderModelsSide();
    updateModelSelectorLabel();
    renderConversationsList();
    renderChatFromMessages();
}

function saveModels() {
    localStorage.setItem('nexus_models', JSON.stringify(modelos));
}

function saveConversations() {
    localStorage.setItem('nexus_conversations', JSON.stringify(conversations));
    localStorage.setItem('nexus_current_conv', currentConvId);
}

function newConversation(title = null) {
    const id = Date.now().toString();
    const convTitle = title || `Chat ${new Date().toLocaleString()}`;
    conversations.unshift({
        id: id,
        title: convTitle,
        messages: []
    });
    currentConvId = id;
    currentMessages = [];
    renderChatFromMessages();
    renderConversationsList();
    saveConversations();
    const welcome = document.getElementById('big-welcome');
    if (welcome) welcome.style.display = 'flex';
}

function saveCurrentConversation() {
    if (!currentConvId) return;
    const index = conversations.findIndex(c => c.id === currentConvId);
    if (index !== -1) {
        conversations[index].messages = [...currentMessages];
        if (conversations[index].title === `Chat ${new Date(parseInt(currentConvId)).toLocaleString()}` && currentMessages.length > 0) {
            const firstUserMsg = currentMessages.find(m => m.role === 'user');
            if (firstUserMsg) {
                let newTitle = firstUserMsg.content.slice(0, 30);
                conversations[index].title = newTitle + (firstUserMsg.content.length > 30 ? '...' : '');
            }
        }
        saveConversations();
        renderConversationsList();
    }
}

function loadConversation(id) {
    const conv = conversations.find(c => c.id === id);
    if (conv) {
        currentConvId = id;
        currentMessages = [...conv.messages];
        renderChatFromMessages();
        renderConversationsList();
        saveConversations();
        const welcome = document.getElementById('big-welcome');
        if (welcome && currentMessages.length > 0) welcome.style.display = 'none';
        else if (welcome && currentMessages.length === 0) welcome.style.display = 'flex';
    }
}

function deleteConversation(id) {
    conversations = conversations.filter(c => c.id !== id);
    if (currentConvId === id) {
        if (conversations.length > 0) {
            currentConvId = conversations[0].id;
            currentMessages = conversations[0].messages;
        } else {
            newConversation();
        }
    }
    saveConversations();
    renderConversationsList();
    renderChatFromMessages();
    const welcome = document.getElementById('big-welcome');
    if (welcome && currentMessages.length === 0) welcome.style.display = 'flex';
}

function addMessageToCurrent(role, content, downloadInfo = null) {
    let msgObj = { role, content };
    if (downloadInfo) msgObj.download = downloadInfo;
    currentMessages.push(msgObj);
    saveCurrentConversation();
    const conv = conversations.find(c => c.id === currentConvId);
    if (conv && conv.title.startsWith('Chat ') && currentMessages.length === 1 && role === 'user') {
        let newTitle = content.slice(0, 30);
        conv.title = newTitle + (content.length > 30 ? '...' : '');
        saveConversations();
        renderConversationsList();
    }
}

function renderModelsSide() {
    const container = document.getElementById('modelListSide');
    if (!container) return;
    container.innerHTML = '';
    modelos.forEach(model => {
        const li = document.createElement('li');
        li.textContent = model;
        if (model === activeModel) li.classList.add('active');
        li.onclick = () => {
            activeModel = model;
            renderModelsSide();
            updateModelSelectorLabel();
            document.getElementById('modelDropdown').classList.remove('open');
        };
        container.appendChild(li);
    });
}

function updateModelSelectorLabel() {
    const label = document.getElementById('selectedModelLabel');
    if (label) label.textContent = activeModel;
}

function addModel(name) {
    if (!name.trim()) return;
    if (!modelos.includes(name.trim())) {
        modelos.push(name.trim());
        saveModels();
        renderModelsSide();
        updateModelSelectorLabel();
        buildModelDropdown();
    }
}

function renderChatFromMessages() {
    const chatWindow = document.getElementById('chat-window');
    if (!chatWindow) return;
    chatWindow.innerHTML = '';
    if (currentMessages.length === 0) {
        const welcome = document.getElementById('big-welcome');
        if (welcome) welcome.style.display = 'flex';
        return;
    }
    const welcome = document.getElementById('big-welcome');
    if (welcome) welcome.style.display = 'none';
    
    currentMessages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `bubble ${msg.role}`;
        let contentHtml = msg.content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>');
        if (msg.role === 'bot' && msg.download) {
            // Crear botón de descarga
            const blob = new Blob([msg.download.content], { type: msg.download.mime });
            const url = URL.createObjectURL(blob);
            contentHtml += `<br><a class="download-btn" href="${url}" download="${msg.download.filename}"><i class="fas fa-download"></i> Descargar ${msg.download.filename}</a>`;
            // Liberar URL después de un tiempo, pero se mantiene mientras se muestre
            setTimeout(() => URL.revokeObjectURL(url), 60000);
        }
        div.innerHTML = contentHtml;
        chatWindow.appendChild(div);
    });
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

function renderConversationsList() {
    const container = document.getElementById('convList');
    if (!container) return;
    container.innerHTML = '';
    conversations.forEach(conv => {
        const li = document.createElement('li');
        li.style.display = 'flex';
        li.style.justifyContent = 'space-between';
        li.style.alignItems = 'center';
        const span = document.createElement('span');
        span.textContent = conv.title;
        span.style.flex = '1';
        span.style.cursor = 'pointer';
        span.onclick = () => loadConversation(conv.id);
        const delBtn = document.createElement('button');
        delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        delBtn.className = 'delete-conv';
        delBtn.onclick = (e) => {
            e.stopPropagation();
            deleteConversation(conv.id);
        };
        li.appendChild(span);
        li.appendChild(delBtn);
        if (conv.id === currentConvId) li.classList.add('active');
        container.appendChild(li);
    });
}

function addMessageToUI(role, content, save = true, downloadInfo = null) {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    if (role === 'bot') {
        let i = 0;
        const speed = 10;
        div.innerHTML = "";
        win.appendChild(div);
        function typeWriter() {
            if (i < content.length) {
                let html = content.substring(0, i + 1);
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>');
                div.innerHTML = html;
                i++;
                win.scrollTop = win.scrollHeight;
                setTimeout(typeWriter, speed);
            } else {
                let finalHtml = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>');
                if (downloadInfo) {
                    const blob = new Blob([downloadInfo.content], { type: downloadInfo.mime });
                    const url = URL.createObjectURL(blob);
                    finalHtml += `<br><a class="download-btn" href="${url}" download="${downloadInfo.filename}"><i class="fas fa-download"></i> Descargar ${downloadInfo.filename}</a>`;
                    setTimeout(() => URL.revokeObjectURL(url), 60000);
                }
                div.innerHTML = finalHtml;
                if (save) addMessageToCurrent(role, content, downloadInfo);
            }
        }
        typeWriter();
    } else {
        div.innerHTML = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        if (save) addMessageToCurrent(role, content);
    }
}

function showLoading() {
    const win = document.getElementById('chat-window');
    if(!win) return null;
    const loaderDiv = document.createElement('div');
    loaderDiv.id = 'current-loading';
    loaderDiv.className = 'bubble bot';
    loaderDiv.innerHTML = '<div class="premium-loader"></div>';
    win.appendChild(loaderDiv);
    win.scrollTop = win.scrollHeight;
    return loaderDiv.id;
}

function removeLoading(id) {
    const el = document.getElementById(id);
    if(el) el.remove();
}

function handleSend() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if(!text) return;

    const welcome = document.getElementById('big-welcome');
    if(welcome) welcome.style.display = 'none';

    addMessageToUI('user', text, true);
    input.value = '';
    
    const loadingId = showLoading();
    
    setTimeout(() => {
        try {
            if(window.NexusBrain) {
                const result = window.NexusBrain.analyze(text, activeModel);
                removeLoading(loadingId);
                if(result.action && result.action !== "none") {
                    document.body.className = result.action;
                }
                addMessageToUI('bot', result.text, true, result.download || null);
            } else {
                removeLoading(loadingId);
                addMessageToUI('bot', "Error: Sistema no disponible", true);
            }
        } catch(e) {
            removeLoading(loadingId);
            addMessageToUI('bot', "Error al procesar: " + e.message, true);
        }
    }, 300);
}

function uploadFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.txt,.js,.py,.html,.css,.json,.md';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const content = ev.target.result;
            const userMessage = `📎 Archivo subido: **${file.name}**\n\`\`\`\n${content.slice(0, 1500)}${content.length > 1500 ? '\n... (truncado)' : ''}\n\`\`\``;
            addMessageToUI('user', userMessage, true);
            const loadingId = showLoading();
            setTimeout(() => {
                const botResponse = `He recibido el archivo **${file.name}**. Contiene ${content.length} caracteres. ¿Quieres que analice algo en específico?`;
                removeLoading(loadingId);
                addMessageToUI('bot', botResponse, true);
            }, 300);
        };
        reader.readAsText(file, 'UTF-8');
    };
    input.click();
}

function initParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 4 + 2;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.bottom = `-10px`;
        particle.style.animationDelay = `${Math.random() * 10}s`;
        particle.style.animationDuration = `${Math.random() * 8 + 5}s`;
        container.appendChild(particle);
    }
}

function buildModelDropdown() {
    const dropdown = document.getElementById('modelDropdown');
    dropdown.innerHTML = '';
    modelos.forEach(model => {
        const option = document.createElement('div');
        option.textContent = model;
        option.onclick = () => {
            activeModel = model;
            updateModelSelectorLabel();
            renderModelsSide();
            dropdown.classList.remove('open');
        };
        dropdown.appendChild(option);
    });
}

function setGreeting() {
    const hora = new Date().getHours();
    let saludo = "¡Buenas noches!";
    if (hora >= 6 && hora < 12) saludo = "¡Buenos días!";
    else if (hora >= 12 && hora < 19) saludo = "¡Buenas tardes!";
    const greetElement = document.getElementById('display-greet');
    if(greetElement) greetElement.textContent = saludo;
}

window.onload = () => {
    initParticles();
    setGreeting();
    loadStorage();
    buildModelDropdown();
    
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');
    const closeBtn = document.getElementById('closeSidebar');
    menuBtn.onclick = () => sidebar.classList.add('open');
    closeBtn.onclick = () => sidebar.classList.remove('open');
    document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && e.target !== menuBtn && sidebar.classList.contains('open')) {
            sidebar.classList.remove('open');
        }
    });
    
    document.getElementById('addModelBtn').onclick = () => {
        const input = document.getElementById('newModelName');
        addModel(input.value);
        input.value = '';
        buildModelDropdown();
    };
    document.getElementById('newConvBtn').onclick = () => newConversation();
    document.getElementById('saveCurrentConvBtn').onclick = () => saveCurrentConversation();
    document.getElementById('fileUploadBtn').onclick = () => uploadFile();
    
    const selectorBtn = document.getElementById('modelSelectorBtn');
    const dropdown = document.getElementById('modelDropdown');
    selectorBtn.onclick = (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('open');
        buildModelDropdown();
    };
    document.addEventListener('click', (e) => {
        if (!selectorBtn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('open');
        }
    });
    
    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') handleSend();
    });
};
</script>
</body>
