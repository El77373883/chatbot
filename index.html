<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexusCore AI | Enterprise Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --bg: #030712; 
            --glass: rgba(17, 24, 39, 0.85); 
            --text: #f9fafb; 
            --border: rgba(255, 255, 255, 0.1); 
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
            color: var(--text); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            position: relative;
        }

        /* --- Saludo Central Grande --- */
        #big-welcome {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .welcome-title {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(to bottom, #ffffff, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: block;
        }

        .welcome-subtitle {
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        header { 
            padding: 15px 20px; 
            padding-top: calc(15px + env(safe-area-inset-top));
            background: var(--glass); border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            backdrop-filter: blur(15px); z-index: 100;
        }

        .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
        .brand span { color: var(--primary); }
        
        .icon-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 5px; display: flex; align-items: center; transition: 0.2s; }
        .icon-btn:hover { color: var(--text); }

        #settings-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: var(--glass); border-left: 1px solid var(--border);
            z-index: 1000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            padding: 40px 25px; backdrop-filter: blur(25px);
        }
        #settings-menu.open { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .menu-header { font-weight: 700; font-size: 20px; margin-bottom: 30px; display: block; }
        .setting-item { margin-bottom: 25px; }
        .setting-item label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        select { width: 100%; background: #030712; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 12px; outline: none; font-size: 14px; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; position: relative; z-index: 10; }
        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        .bot { background: var(--glass); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }

        #loading-area { display: none; padding: 0 20px; margin-bottom: 10px; z-index: 10; }
        .typing-bubble { display: inline-flex; align-items: center; gap: 5px; background: var(--glass); padding: 10px 15px; border-radius: 15px; border: 1px solid var(--border); }
        .dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .input-area { background: var(--glass); border-top: 1px solid var(--border); padding: 15px 20px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); backdrop-filter: blur(15px); z-index: 100; }
        .toolbar { display: flex; gap: 18px; margin-bottom: 12px; padding-left: 5px; }
        .tool-icon { color: #94a3b8; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .tool-icon:hover { color: var(--primary); }

        .input-container { background: #030712; border-radius: 30px; display: flex; padding: 5px 8px 5px 15px; align-items: center; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 16px; outline: none; }
        
        .mic-active { color: #ef4444; font-weight: 700; font-size: 9px; margin-right: 10px; display: none; animation: pulse 1s infinite; letter-spacing: 1px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .send-btn { 
            background: var(--primary); color: white; border: none; 
            width: 36px; height: 36px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>

<div id="settings-menu">
    <span class="menu-header">Configuración</span>
    <div class="setting-item">
        <label>Motor de Inteligencia</label>
        <select id="model-select">
            <option value="Nexus-V3">Nexus V3 (Estable)</option>
            <option value="Nexus-V5">Nexus V5 (Neural Pro)</option>
            <option value="Claude-V3">Claude V3 (Creativo)</option>
        </select>
    </div>
    <div class="setting-item">
        <label>Memoria Local</label>
        <button onclick="clearChat()" style="width:100%; padding:12px; background:rgba(239, 68, 68, 0.1); border:1px solid #ef4444; color:#ef4444; border-radius:12px; font-weight:600; cursor:pointer;">Limpiar Historial</button>
    </div>
    <button onclick="toggleSettings()" style="width:100%; padding:14px; background:var(--primary); border:none; color:white; border-radius:12px; margin-top: 50px; font-weight:700; cursor:pointer;">Guardar Cambios</button>
</div>

<header>
    <div class="brand">NEXUS<span>CORE</span></div>
    <button class="icon-btn" onclick="toggleSettings()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
</header>

<div id="big-welcome">
    <span class="welcome-title" id="display-greet">Cargando...</span>
    <span class="welcome-subtitle">¿En qué te puedo ayudar?</span>
</div>

<div id="chat-window"></div>

<div id="loading-area">
    <div class="typing-bubble">
        <div class="dot"></div> <div class="dot"></div> <div class="dot"></div>
        <span style="font-size: 12px; color: #94a3b8; margin-left: 5px;">Procesando...</span>
    </div>
</div>

<div class="input-area">
    <div class="toolbar">
        <label for="img-input" class="tool-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </label>
        <input type="file" id="img-input" hidden accept="image/*" onchange="handleMedia('Imagen')">
        
        <label for="vid-input" class="tool-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        </label>
        <input type="file" id="vid-input" hidden accept="video/*" onchange="handleMedia('Video')">
        
        <span class="tool-icon" onclick="toggleMic()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </span>
    </div>

    <div class="input-container">
        <span id="mic-status" class="mic-active">● REC</span>
        <input type="text" id="user-input" placeholder="Escribe un mensaje..." autocomplete="off">
        <button class="send-btn" onclick="handleSend()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
    </div>
</div>

<script src="database.js"></script>
<script src="brain.js"></script>

<script>
    const chatWin = document.getElementById('chat-window');
    const inputField = document.getElementById('user-input');
    const settingsMenu = document.getElementById('settings-menu');
    const micStatus = document.getElementById('mic-status');
    const loadingArea = document.getElementById('loading-area');
    const bigWelcome = document.getElementById('big-welcome');
    const displayGreet = document.getElementById('display-greet');

    function toggleSettings() { settingsMenu.classList.toggle('open'); }

    function toggleMic() {
        const isMicOn = micStatus.style.display === 'block';
        micStatus.style.display = isMicOn ? 'none' : 'block';
        inputField.placeholder = isMicOn ? "Escribe un mensaje..." : "Escuchando entrada de audio...";
    }

    function setBigGreeting() {
        const hora = new Date().getHours();
        let saludo = "¡Buenas Noches!";
        if (hora >= 6 && hora < 12) saludo = "¡Buenos Días!";
        else if (hora >= 12 && hora < 19) saludo = "¡Buenas Tardes!";
        displayGreet.innerText = saludo;
    }

    function handleMedia(type) {
        if(bigWelcome.style.opacity !== "0") hideWelcome();
        save('user', `Adjunto archivo de ${type} para análisis.`);
        loadingArea.style.display = 'block';
        setTimeout(() => {
            loadingArea.style.display = 'none';
            save('bot', `[NEXUS CORE] Análisis de ${type} completado. Integridad verificada.`);
        }, 1500);
    }

    function hideWelcome() {
        bigWelcome.style.opacity = "0";
        bigWelcome.style.transform = "translate(-50%, -55%)";
        setTimeout(() => { bigWelcome.style.display = "none"; }, 800);
    }

    function render() {
        const history = JSON.parse(localStorage.getItem('nexus_ultra')) || [];
        if(history.length > 0) bigWelcome.style.display = "none"; 
        chatWin.innerHTML = '';
        history.forEach(m => {
            const d = document.createElement('div');
            d.className = `bubble ${m.role}`;
            d.innerHTML = m.content;
            chatWin.appendChild(d);
        });
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    async function handleSend() {
        const text = inputField.value.trim();
        if(!text) return;
        if(bigWelcome.style.display !== "none") hideWelcome();

        save('user', text);
        inputField.value = '';
        loadingArea.style.display = 'block';
        chatWin.scrollTop = chatWin.scrollHeight;

        if(window.NexusBrain) {
            const model = document.getElementById('model-select').value;
            const response = await window.NexusBrain.analyze(text, model);
            setTimeout(() => {
                loadingArea.style.display = 'none';
                save('bot', response);
            }, 1200);
        }
    }

    function save(role, content) {
        const history = JSON.parse(localStorage.getItem('nexus_ultra')) || [];
        history.push({role, content});
        localStorage.setItem('nexus_ultra', JSON.stringify(history));
        render();
    }

    function clearChat() { localStorage.removeItem('nexus_ultra'); location.reload(); }
    inputField.onkeypress = (e) => { if(e.key === 'Enter') handleSend() };
    
    setBigGreeting();
    render();
</script>
</body>
</html>
