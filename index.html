<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexusCore AI | soyadrianyt001</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #030712; 
            --glass: rgba(11, 17, 33, 0.8); 
            --text: #f9fafb; 
            --border: rgba(255, 255, 255, 0.1); 
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }

        @keyframes auroraBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #0a0a0a, transparent);
            background-size: 200% 200%;
            animation: auroraBg 15s ease infinite;
            color: var(--text); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            transition: all 0.5s ease;
        }

        /* MODOS VISUALES */
        body.hacker { --primary: #00ff41; background: #000; }
        body.epico { --primary: #ff4500; }

        header { 
            padding: 15px 20px; 
            background: var(--glass); border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            backdrop-filter: blur(20px); z-index: 100;
        }

        .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
        .brand span { color: var(--primary); }
        .creator-tag { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 700; }
        .creator-tag span { color: var(--primary); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; scroll-behavior: smooth; }

        #big-welcome {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; width: 90%; z-index: 5;
            transition: all 0.6s ease;
        }

        .welcome-title {
            font-size: 38px; font-weight: 700;
            background: linear-gradient(90deg, #ffffff, #6366f1, #a855f7, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorFlow 6s linear infinite;
            margin-bottom: 5px; display: block;
        }

        @keyframes colorFlow { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        .bubble { max-width: 85%; padding: 16px 20px; border-radius: 22px; font-size: 15px; line-height: 1.6; animation: slideUp 0.4s ease; position: relative; }
        .bot { background: var(--glass); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .user { background: linear-gradient(135deg, #6366f1, #4338ca); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        .premium-loader {
            width: 24px; height: 24px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 5px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-controls {
            background: var(--glass); border-top: 1px solid var(--border);
            padding: 15px 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom));
            backdrop-filter: blur(20px); z-index: 100;
        }

        .model-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 0 10px; }
        .model-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; flex: 1; scrollbar-width: none; }
        .model-bar::-webkit-scrollbar { display: none; }

        .model-chip {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #94a3b8; padding: 8px 16px; border-radius: 20px; font-size: 10px;
            font-weight: 700; cursor: pointer; transition: 0.3s; white-space: nowrap; text-transform: uppercase;
        }
        .model-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .input-container { 
            background: rgba(0, 0, 0, 0.4); border-radius: 28px; display: flex; 
            padding: 6px 6px 6px 20px; align-items: center; border: 1px solid var(--border);
            margin: 0 10px;
        }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; font-size: 16px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } }
        
        code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<header>
    <div class="brand-container">
        <div class="brand">NEXUS<span>CORE</span></div>
        <span class="creator-tag">CREADOR: <span>SOYADRIANYT001</span></span>
    </div>
</header>

<div id="big-welcome">
    <span class="welcome-title" id="display-greet">Sincronizando...</span>
    <span style="font-size: 13px; color: #94a3b8; letter-spacing: 1px; font-weight: 500;">¿En qué puedo ayudarte hoy?</span>
</div>

<div id="chat-window"></div>

<div class="bottom-controls">
    <div class="model-container">
        <div class="model-bar" id="model-list"></div>
        <button onclick="clearChat()" style="background:rgba(239, 68, 68, 0.1); border:1px solid rgba(239, 68, 68, 0.2); color:#ef4444; padding: 8px 12px; border-radius: 12px; font-size:9px; font-weight:700; cursor:pointer;">RESETEAR</button>
    </div>

    <div class="input-container">
        <input type="text" id="user-input" placeholder="Escribe un mensaje..." autocomplete="off">
        <button class="send-btn" onclick="handleSend()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
    </div>
</div>

<script>
// ==================== DATABASE.JS ====================
window.NexusDatabase = {
    categorias: {
        saludos: {
            claves: ["hola", "buenas", "saludos", "hey", "que tal", "hello", "holi", "buen dia", "buenas tardes", "buenas noches"],
            respuestas: {
                manana: [
                    "¡Buenos días! ☀️ ¿En qué puedo ayudarte?",
                    "¡Excelente mañana! ¿Qué necesitas procesar? 🚀",
                    "Buen día, comandante. Todo listo para trabajar"
                ],
                tarde: [
                    "¡Buenas tardes! 🌤️ ¿Cómo va tu día?",
                    "Tarde productiva, ¿en qué te ayudo?",
                    "Buenas tardes, sistema al 100%"
                ],
                noche: [
                    "¡Buenas noches! 🌙 Descansa, yo trabajo por ti",
                    "Noche activa, ¿qué deseas consultar?",
                    "Buenas noches, listo para asistirte"
                ]
            }
        },
        
        minecraft: {
            claves: ["minecraft", "diamante", "nether", "ender", "crafteo", "bloque", "pico"],
            respuestas: [
                "🎮 En Minecraft, los diamantes se encuentran en Y=-58",
                "⛏️ El Netherite es el material más fuerte del juego",
                "🧱 Para craftear necesitas una mesa de trabajo",
                "🏰 El Ender Dragon es el jefe final del juego"
            ]
        },
        
        roblox: {
            claves: ["roblox", "adopt me", "brookhaven", "blox fruits"],
            respuestas: [
                "🎮 Roblox tiene millones de juegos, ¿cuál te interesa?",
                "🕹️ En Blox Fruits las mejores frutas son Leopardo y Dragón",
                "🎲 Brookhaven es uno de los juegos más populares",
                "💰 En Adopt Me las mascotas legendarias son muy valiosas"
            ]
        },
        
        freefire: {
            claves: ["free fire", "ff", "diamante", "personaje", "alok"],
            respuestas: [
                "🔫 En Free Fire, Alok es uno de los mejores personajes",
                "💎 Los diamantes se consiguen en eventos o con recargas",
                "🏆 La M1887 es el arma más usada en close combat"
            ]
        },
        
        creador: {
            claves: ["quien eres", "que eres", "creador", "quien te creo", "que puedes hacer"],
            respuestas: [
                "🤖 Soy NexusCore, creado por **soyadrianyt001**. Estoy aquí para ayudarte",
                "⚡ Mi creador es soyadrianyt001, un desarrollador experto en IA",
                "💬 Puedo saludarte, responder preguntas de juegos y cambiar mi estilo visual"
            ]
        },
        
        ayuda: {
            claves: ["ayuda", "comandos", "que hacer", "como usar"],
            respuestas: [
                "📌 **Comandos disponibles:**\n• 'hola' - Saludo\n• 'minecraft' - Info del juego\n• 'roblox' - Info de Roblox\n• 'modo hacker' - Cambia el tema\n• 'modo epico' - Tema épico\n• 'normal' - Volver al tema original",
                "🆘 Escribe 'hola' para saludar, o pregúntame sobre Minecraft, Roblox o Free Fire. También puedes cambiar el tema visual con 'modo hacker' o 'modo epico'"
            ]
        }
    },
    
    default: [
        "Interesante... cuéntame más 🧠",
        "No tengo información de eso aún. Pregúntame sobre juegos o usa 'ayuda'",
        "Procesando... ¿Puedes repetir?",
        "Soy NexusCore, pregúntame sobre juegos o usa 'hola' para saludar",
        "No entiendo esa consulta. Escribe 'ayuda' para ver qué puedo hacer"
    ]
};

// ==================== BRAIN.JS ====================
const NexusBrain = {
    analyze: function(input, modelId) {
        var msg = input.toLowerCase().trim();
        var db = window.NexusDatabase;
        var respuestaFinal = "";
        var colorModo = "none";

        // 1. MODOS VISUALES
        if (msg.includes("hacker")) {
            colorModo = "hacker";
            respuestaFinal = "🖥️ Modo Hacker activado. Interfaz reconfigurada.";
        } else if (msg.includes("epico")) {
            colorModo = "epico";
            respuestaFinal = "🔥 Modo Épico activado. Potencia al máximo.";
        } else if (msg.includes("normal") || msg.includes("resetear")) {
            colorModo = "normal";
            respuestaFinal = "🔄 Modo Normal restaurado. Estilo original.";
        }

        // Si ya se activó un modo, retornamos inmediatamente
        if (colorModo !== "none") {
            return {
                text: "<strong style='color: var(--primary);'>[" + modelId.toUpperCase() + "]</strong><br><br>" + respuestaFinal,
                action: colorModo
            };
        }

        // 2. BUSCAR EN LA BASE DE DATOS
        var encontrado = false;
        
        for (var cat in db.categorias) {
            var categoria = db.categorias[cat];
            
            // Verificar si alguna clave coincide
            for (var i = 0; i < categoria.claves.length; i++) {
                if (msg.includes(categoria.claves[i])) {
                    
                    // Si es saludo
                    if (cat === "saludos") {
                        var hora = new Date().getHours();
                        var momento;
                        if (hora >= 6 && hora < 12) {
                            momento = "manana";
                        } else if (hora >= 12 && hora < 19) {
                            momento = "tarde";
                        } else {
                            momento = "noche";
                        }
                        var respuestasMomento = categoria.respuestas[momento];
                        var numAleatorio = Math.floor(Math.random() * respuestasMomento.length);
                        respuestaFinal = respuestasMomento[numAleatorio];
                    } 
                    // Para otras categorías
                    else {
                        var numAleatorio = Math.floor(Math.random() * categoria.respuestas.length);
                        respuestaFinal = categoria.respuestas[numAleatorio];
                    }
                    encontrado = true;
                    break;
                }
            }
            if (encontrado) break;
        }

        // 3. SI NO HAY COINCIDENCIA, USA DEFAULT
        if (!respuestaFinal) {
            var numAleatorio = Math.floor(Math.random() * db.default.length);
            respuestaFinal = db.default[numAleatorio];
        }

        // 4. DEVOLVER RESULTADO
        return {
            text: "<strong style='color: var(--primary);'>[" + modelId.toUpperCase() + "]</strong><br><br>" + respuestaFinal,
            action: colorModo
        };
    }
};

window.NexusBrain = NexusBrain;

// ==================== MAIN APP ====================
let activeModel = "Nexus V5 PRO";
const modelos = [
    { name: "Nexus V5 PRO" },
    { name: "Nexus V4 ULTRA" },
    { name: "Nexus V3 Lite" },
    { name: "Core Engine X" },
    { name: "CyberVision 2.0" }
];

window.onload = () => {
    setGreeting();
    renderModels();
    loadHistory();
};

function renderModels() {
    const container = document.getElementById('model-list');
    if(!container) return;
    container.innerHTML = "";
    modelos.forEach(m => {
        const chip = document.createElement('div');
        chip.className = `model-chip ${m.name === activeModel ? 'active' : ''}`;
        chip.innerText = m.name;
        chip.onclick = () => selectModel(chip, m.name);
        container.appendChild(chip);
    });
}

function setGreeting() {
    const hora = new Date().getHours();
    let saludo = "¡Buenas noches!";
    if (hora >= 6 && hora < 12) saludo = "¡Buenos días!";
    else if (hora >= 12 && hora < 19) saludo = "¡Buenas tardes!";
    const greetElement = document.getElementById('display-greet');
    if(greetElement) {
        greetElement.innerHTML = `${saludo}<br><span style="font-size:20px; opacity:0.8; font-weight:400;">¿Qué deseas procesar?</span>`;
    }
}

function selectModel(el, modelName) {
    document.querySelectorAll('.model-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeModel = modelName;
}

function handleSend() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if(!text) return;

    const welcome = document.getElementById('big-welcome');
    if(welcome) {
        welcome.style.opacity = "0";
        setTimeout(() => { if(welcome && welcome.parentNode) welcome.remove(); }, 600);
    }

    addMessage('user', text);
    input.value = '';
    const loadingId = showLoading();

    setTimeout(() => {
        try {
            if(window.NexusBrain) {
                const result = window.NexusBrain.analyze(text, activeModel);
                removeLoading(loadingId);
                
                if(result.action && result.action !== "none") {
                    document.body.className = result.action;
                }
                addMessage('bot', result.text);
                saveHistory();
            } else {
                removeLoading(loadingId);
                addMessage('bot', "Error: Sistema no disponible");
            }
        } catch(e) {
            removeLoading(loadingId);
            addMessage('bot', "Error al procesar: " + e.message);
        }
    }, 300);
}

function addMessage(role, content) {
    const win = document.getElementById('chat-window');
    if(!win) return;
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    win.appendChild(div);
    
    if (role === 'bot') {
        let i = 0;
        const speed = 10;
        div.innerHTML = "";
        function typeWriter() {
            if (i < content.length) {
                let html = content.substring(0, i + 1);
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>');
                div.innerHTML = html;
                i++;
                win.scrollTop = win.scrollHeight;
                setTimeout(typeWriter, speed);
            } else {
                let finalHtml = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>');
                div.innerHTML = finalHtml;
                saveHistory();
            }
        }
        typeWriter();
    } else {
        div.innerHTML = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        saveHistory();
    }
    win.scrollTop = win.scrollHeight;
}

function showLoading() {
    const win = document.getElementById('chat-window');
    if(!win) return null;
    const loaderDiv = document.createElement('div');
    loaderDiv.id = 'current-loading';
    loaderDiv.className = 'bubble bot';
    loaderDiv.innerHTML = '<div class="premium-loader"></div>';
    win.appendChild(loaderDiv);
    win.scrollTop = win.scrollHeight;
    return loaderDiv.id;
}

function removeLoading(id) {
    const el = document.getElementById(id);
    if(el) el.remove();
}

function saveHistory() {
    const chatWindow = document.getElementById('chat-window');
    if(chatWindow) {
        localStorage.setItem('nexus_storage_v2', chatWindow.innerHTML);
    }
}

function loadHistory() {
    const saved = localStorage.getItem('nexus_storage_v2');
    const chatWindow = document.getElementById('chat-window');
    const welcome = document.getElementById('big-welcome');
    
    if(saved && saved.trim() !== "" && chatWindow) {
        if(welcome) welcome.style.display = 'none';
        chatWindow.innerHTML = saved;
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
}

function clearChat() {
    if(confirm("¿Reiniciar sistema? Se borrará el historial.")) {
        localStorage.removeItem('nexus_storage_v2');
        location.reload();
    }
}

document.getElementById('user-input')?.addEventListener('keypress', (e) => { 
    if(e.key === 'Enter') handleSend(); 
});
</script>
</body>
</html>
