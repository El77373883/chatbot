<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI | Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --bot-bubble: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Contenedor Principal */
        .chat-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Header Profesional */
        header {
            padding: 20px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-dot {
            width: 10px; height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        /* Área de Mensajes */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot {
            background: var(--bot-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user {
            background: var(--primary-color);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* Indicador de "Escribiendo..." */
        .typing {
            font-style: italic;
            color: var(--text-dim);
            font-size: 0.8rem;
            display: none;
        }

        /* Input de Mensaje */
        .input-box {
            padding: 20px;
            background: var(--card-bg);
            display: flex;
            gap: 10px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 18px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        button {
            background: var(--primary-color);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="chat-wrapper">
    <header>
        <div class="status-dot"></div>
        <div>
            <div style="font-weight: 600;">Nexus AI</div>
            <div style="font-size: 0.7rem; color: var(--text-dim);">Soporte Inteligente</div>
        </div>
    </header>

    <div id="chat-flow">
        <div class="msg bot">Hola. Soy Nexus. He sido optimizado para responder tus dudas técnicas. ¿En qué puedo ayudarte hoy?</div>
        <div id="typing-indicator" class="typing">Nexus está pensando...</div>
    </div>

    <div class="input-box">
        <input type="text" id="user-text" placeholder="Escribe un comando..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script>
    const flow = document.getElementById('chat-flow');
    const input = document.getElementById('user-text');
    const btn = document.getElementById('send-btn');
    const typing = document.getElementById('typing-indicator');

    // Cerebro del Bot: Lógica de coincidencia más flexible
    const responses = [
        { keywords: ['proyectos', 'github', 'hacer'], answer: "Para tu GitHub profesional, te recomiendo: 1. Un acortador de URLs, 2. Un gestor de tareas con LocalStorage, o 3. Este mismo Chatbot mejorado con una API de IA." },
        { keywords: ['quien eres', 'nombre'], answer: "Soy Nexus AI, un asistente frontend minimalista creado para entornos móviles." },
        { keywords: ['iphone', 'celular'], answer: "Detecto que estás en un iPhone. Este chat usa 'safe-area-inset' para ajustarse perfectamente a tu pantalla." },
        { keywords: ['gracias', 'chau', 'adios'], answer: "Ha sido un placer. ¡Sigue programando!" }
    ];

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.textContent = text;
        flow.insertBefore(div, typing); // Insertar antes del indicador de escritura
        flow.scrollTop = flow.scrollHeight;
    }

    function processInput() {
        const val = input.value.trim().toLowerCase();
        if (!val) return;

        addMessage(input.value, 'user');
        input.value = '';

        // Simular pensamiento pro
        typing.style.display = 'block';
        flow.scrollTop = flow.scrollHeight;

        setTimeout(() => {
            typing.style.display = 'none';
            let found = responses.find(r => r.keywords.some(k => val.includes(k)));
            
            if (found) {
                addMessage(found.answer, 'bot');
            } else {
                addMessage("Entiendo tu punto. Sin embargo, mi base de datos actual es limitada. ¿Podrías intentar con otra consulta?", 'bot');
            }
        }, 1200);
    }

    btn.onclick = processInput;
    input.onkeypress = (e) => { if(e.key === 'Enter') processInput() };
</script>

</body>
</html>
