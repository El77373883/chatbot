<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adrian AI</title>

<style>

body{
margin:0;
height:100vh;
background:#0f172a;
font-family:Arial, Helvetica, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:700px;
height:100vh;
background:#020617;
display:flex;
flex-direction:column;
}

.header{
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
border-bottom:1px solid #1e293b;
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
padding:12px 15px;
margin:10px 0;
border-radius:10px;
max-width:75%;
word-wrap:break-word;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1e293b;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #1e293b;
gap:8px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
outline:none;
background:#0f172a;
color:white;
font-size:16px;
}

button{
padding:12px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
}

.upload{
background:#334155;
}

img.preview{
max-width:200px;
border-radius:8px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
🐉 Adrian AI
</div>

<div id="chat" class="chat">
<div class="message bot">Hola 👋 soy Adrian AI. ¿En qué puedo ayudarte?</div>
</div>

<div class="input-area">

<input id="msg" placeholder="Escribe tu mensaje...">

<input type="file" id="fileInput" style="display:none" onchange="uploadFile()">

<button class="upload" onclick="document.getElementById('fileInput').click()">📎</button>

<button onclick="send()">Enviar</button>

</div>

</div>

<script>

function send(){

let input=document.getElementById("msg")
let msg=input.value

if(msg==="") return

let chat=document.getElementById("chat")

let user=document.createElement("div")
user.className="message user"
user.innerText=msg
chat.appendChild(user)

let bot=document.createElement("div")
bot.className="message bot"
bot.innerText="Estoy aprendiendo todavía."

chat.appendChild(bot)

input.value=""
chat.scrollTop=chat.scrollHeight

}

function uploadFile(){

let file=document.getElementById("fileInput").files[0]
if(!file) return

let chat=document.getElementById("chat")

let user=document.createElement("div")
user.className="message user"

if(file.type.startsWith("image")){

let img=document.createElement("img")
img.src=URL.createObjectURL(file)
img.className="preview"
user.appendChild(img)

}else{

user.innerText="📄 Archivo: "+file.name

}

chat.appendChild(user)
chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
