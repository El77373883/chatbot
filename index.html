<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexusCore AI | Enterprise Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #030712; 
            --glass: rgba(11, 17, 33, 0.8); 
            --text: #f9fafb; 
            --border: rgba(255, 255, 255, 0.08); 
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), radial-gradient(circle at bottom left, #0a0a0a, transparent);
            color: var(--text); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            position: relative;
        }

        /* --- Saludo Central Grande --- */
        #big-welcome {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            z-index: 5;
            pointer-events: none;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-title {
            font-size: 46px;
            font-weight: 700;
            background: linear-gradient(to bottom, #ffffff 30%, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: block;
            filter: drop-shadow(0 0 15px var(--primary-glow));
        }

        .welcome-subtitle {
            font-size: 10px;
            color: #64748b;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        header { 
            padding: 15px 20px; 
            padding-top: calc(15px + env(safe-area-inset-top));
            background: var(--glass); 
            border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100;
        }

        .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--primary); }
        .brand::before { content: ''; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }
        
        .icon-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 8px; border-radius: 10px; display: flex; align-items: center; transition: 0.3s; }
        .icon-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }

        #settings-menu {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
            background: rgba(3, 7, 18, 0.95); border-left: 1px solid var(--border);
            z-index: 1000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            padding: 40px 25px; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }
        #settings-menu.open { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; z-index: 10; mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent); }
        
        .bubble { 
            max-width: 85%; padding: 16px 20px; border-radius: 22px; 
            font-size: 15px; line-height: 1.6; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bot { 
            background: var(--glass); align-self: flex-start; 
            border: 1px solid var(--border); border-bottom-left-radius: 4px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .user { 
            background: linear-gradient(135deg, #6366f1, #4338ca); 
            align-self: flex-end; border-bottom-right-radius: 4px; 
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        #loading-area { display: none; padding: 0 25px; margin-bottom: 15px; }
        .typing-bubble { display: inline-flex; align-items: center; gap: 6px; background: var(--glass); padding: 12px 18px; border-radius: 20px; border: 1px solid var(--border); }
        .dot { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; opacity: 0.6; }

        .input-area { 
            background: var(--glass); border-top: 1px solid var(--border); 
            padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        .input-container { 
            background: rgba(0, 0, 0, 0.4); border-radius: 24px; display: flex; 
            padding: 6px 6px 6px 18px; align-items: center; 
            border: 1px solid var(--border); transition: 0.3s;
        }
        .input-container:focus-within { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; font-size: 16px; outline: none; }
        
        .send-btn { 
            background: var(--primary); color: white; border: none; 
            width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; box-shadow: 0 4px 12px var(--primary-glow);
        }
        .send-btn:hover { transform: rotate(-10deg) scale(1.1); }
    </style>
</head>
<body>

<div id="settings-menu">
    <span class="menu-header">Sistema</span>
    <div class="setting-item">
        <label>Núcleo de Procesamiento</label>
        <select id="model-select">
            <option value="Nexus-V5">Nexus V5 (Neural Pro)</option>
            <option value="Nexus-V3">Nexus V3 (Estable)</option>
            <option value="Claude-V3">Claude V3 (Creativo)</option>
        </select>
    </div>
    <div class="setting-item">
        <label>Datos</label>
        <button onclick="clearChat()" style="width:100%; padding:14px; background:transparent; border:1px solid #ef4444; color:#ef4444; border-radius:14px; font-weight:600; cursor:pointer; transition:0.3s;" onmouseover="this.style.background='#ef4444'; this.style.color='white'" onmouseout="this.style.background='transparent'; this.style.color='#ef4444'">BORRAR MEMORIA</button>
    </div>
    <button onclick="toggleSettings()" style="width:100%; padding:16px; background:var(--primary); border:none; color:white; border-radius:16px; margin-top: 50px; font-weight:700; cursor:pointer; box-shadow: 0 10px 20px var(--primary-glow);">GUARDAR CONFIGURACIÓN</button>
</div>

<header>
    <div class="brand">NEXUS<span>CORE</span></div>
    <button class="icon-btn" onclick="toggleSettings()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
</header>

<div id="big-welcome">
    <span class="welcome-title" id="display-greet">Sincronizando...</span>
    <span class="welcome-subtitle">Enterprise Intelligence Suite</span>
</div>

<div id="chat-window"></div>

<div id="loading-area">
    <div class="typing-bubble">
        <div class="dot"></div> <div class="dot"></div> <div class="dot"></div>
    </div>
</div>

<div class="input-area">
    <div class="toolbar" style="display:flex; gap:20px; margin-bottom:15px; opacity:0.7">
        <label for="img-input" class="icon-btn" style="padding:0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </label>
        <input type="file" id="img-input" hidden onchange="handleMedia('Imagen')">
        
        <label for="vid-input" class="icon-btn" style="padding:0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        </label>
        <input type="file" id="vid-input" hidden onchange="handleMedia('Video')">
        
        <span class="icon-btn" style="padding:0" onclick="toggleMic()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
        </span>
    </div>

    <div class="input-container">
        <span id="mic-status" class="mic-active">SYNC</span>
        <input type="text" id="user-input" placeholder="Consultar a NexusCore..." autocomplete="off">
        <button class="send-btn" onclick="handleSend()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
    </div>
</div>

<script src="database.js"></script>
<script src="brain.js"></script>

<script>
    const chatWin = document.getElementById('chat-window');
    const inputField = document.getElementById('user-input');
    const bigWelcome = document.getElementById('big-welcome');
    const displayGreet = document.getElementById('display-greet');

    function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }

    function setBigGreeting() {
        const hora = new Date().getHours();
        let saludo = "¡Buenas Noches!";
        if (hora >= 6 && hora < 12) saludo = "¡Buenos Días!";
        else if (hora >= 12 && hora < 19) saludo = "¡Buenas Tardes!";
        displayGreet.innerText = saludo;
    }

    function hideWelcome() {
        bigWelcome.style.opacity = "0";
        bigWelcome.style.transform = "translate(-50%, -65%) scale(0.9)";
        setTimeout(() => { bigWelcome.style.display = "none"; }, 1000);
    }

    async function handleSend() {
        const text = inputField.value.trim();
        if(!text) return;
        if(bigWelcome.style.display !== "none") hideWelcome();

        save('user', text);
        inputField.value = '';
        document.getElementById('loading-area').style.display = 'block';
        chatWin.scrollTop = chatWin.scrollHeight;

        if(window.NexusBrain) {
            const model = document.getElementById('model-select').value;
            const response = await window.NexusBrain.analyze(text, model);
            setTimeout(() => {
                document.getElementById('loading-area').style.display = 'none';
                save('bot', response);
            }, 1000);
        }
    }

    function save(role, content) {
        const history = JSON.parse(localStorage.getItem('nexus_ultra')) || [];
        history.push({role, content});
        localStorage.setItem('nexus_ultra', JSON.stringify(history));
        render();
    }

    function render() {
        const history = JSON.parse(localStorage.getItem('nexus_ultra')) || [];
        if(history.length > 0) bigWelcome.style.display = "none";
        chatWin.innerHTML = '';
        history.forEach(m => {
            const d = document.createElement('div');
            d.className = `bubble ${m.role}`;
            d.innerHTML = m.content;
            chatWin.appendChild(d);
        });
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    function clearChat() { localStorage.removeItem('nexus_ultra'); location.reload(); }
    inputField.onkeypress = (e) => { if(e.key === 'Enter') handleSend() };
    setBigGreeting();
    render();
</script>
</body>
</html>
