<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexusCore AI | Terminal v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #818cf8;
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f9fafb;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header Estilo iOS --- */
        header {
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand { display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }
        .brand b { letter-spacing: 1px; font-size: 14px; text-transform: uppercase; }

        select {
            background: #111827;
            color: #fff;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        /* --- Chat Display --- */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 160px; /* Espacio para el input */
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bot { background: var(--glass); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        /* --- Input Bar Pro --- */
        .input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg), transparent);
        }

        .input-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 6px 16px;
            gap: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .send-btn:active { transform: scale(0.9); }

        #status-bar {
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 8px;
            padding-left: 20px;
            display: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="logo-icon"></div>
        <b>Nexus<span>Core</span></b>
    </div>
    <select id="model-select">
        <option value="G4-Ultra">Neural G4</option>
        <option value="C3-Vision">Claude C3</option>
        <option value="G-Pro">Gemini Pro</option>
    </select>
</header>

<div id="chat-window"></div>

<div class="input-area">
    <div id="status-bar">Analizando con el núcleo...</div>
    <div class="input-container">
        <input type="text" id="user-input" placeholder="Comando de sistema..." autocomplete="off">
        <button class="send-btn" onclick="handleSend()">↑</button>
    </div>
</div>

<script src="database.js"></script>
<script src="brain.js"></script>
<script>
    const chatWin = document.getElementById('chat-window');
    const input = document.getElementById('user-input');
    const status = document.getElementById('status-bar');

    let history = JSON.parse(localStorage.getItem('nexus_v2_chat')) || [
        { role: 'bot', content: 'Protocolos de NexusCore v2.0 inicializados. Sistemas operativos al 100%.' }
    ];

    function render() {
        chatWin.innerHTML = '';
        history.forEach(m => {
            const d = document.createElement('div');
            d.className = `bubble ${m.role}`;
            d.innerHTML = m.content;
            chatWin.appendChild(d);
        });
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    async function handleSend() {
        const text = input.value.trim();
        if(!text) return;

        save('user', text);
        input.value = '';
        status.style.display = 'block';

        // Lógica delegada al Cerebro
        const response = await window.NexusBrain.analyze(text, document.getElementById('model-select').value);
        
        setTimeout(() => {
            status.style.display = 'none';
            save('bot', response);
        }, 1200);
    }

    function save(role, content) {
        history.push({role, content});
        localStorage.setItem('nexus_v2_chat', JSON.stringify(history));
        render();
    }

    input.onkeypress = (e) => { if(e.key === 'Enter') handleSend() };
    render();
</script>
</body>
</html>
