<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Adrian AI</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#020617);
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.container{
width:420px;
height:620px;
background:#020617;
border-radius:15px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
border-bottom:1px solid #1e293b;
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
padding:12px 15px;
margin:10px 0;
border-radius:10px;
max-width:75%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1e293b;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
outline:none;
background:#0f172a;
color:white;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Adrian AI</div>

<div id="chat" class="chat">
<div class="message bot">Hola 👋 soy Adrian AI. Pregúntame algo.</div>
</div>

<div class="input-area">
<input id="msg" placeholder="Escribe tu mensaje...">
<button onclick="send()">Enviar</button>
</div>

</div>

<script>

function send(){

let input=document.getElementById("msg")
let msg=input.value

if(msg==="") return

let chat=document.getElementById("chat")

let user=document.createElement("div")
user.className="message user"
user.innerText=msg
chat.appendChild(user)

let bot=document.createElement("div")
bot.className="message bot"

let text=msg.toLowerCase()

if(text.includes("hola")){
bot.innerText="Hola 👋 ¿cómo estás?"
}
else if(text.includes("quien eres")){
bot.innerText="Soy Adrian AI, tu asistente."
}
else if(text.includes("adios")){
bot.innerText="Hasta luego 👋"
}
else{
bot.innerText="Todavía estoy aprendiendo."
}

chat.appendChild(bot)

input.value=""

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
