<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexusCore AI | Enterprise Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #0b0f1a;
            --surface: #161b2c;
            --text: #ffffff;
            --text-muted: #94a3b8;
            --border: #2d3748;
            --bot-bubble: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header Pro --- */
        header {
            padding: 15px 20px;
            padding-top: calc(15px + env(safe-area-inset-top));
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo { font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }

        select {
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            appearance: none; /* Estilo minimalista en iOS */
        }

        /* --- Chat Flow --- */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot { background: var(--bot-bubble); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }

        .file-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 8px;
            border-radius: 8px;
            margin-top: 5px;
            font-size: 12px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* --- Input Area --- */
        .controls {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(22, 27, 44, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 5px 15px;
            border-radius: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 0;
            font-size: 16px; /* Evita zoom en iPhone */
            outline: none;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .send-btn {
            color: var(--primary);
            font-weight: 700;
        }

        #status-bar {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: none;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span>NEXUS</span>CORE</div>
    <select id="model-select">
        <option value="Nexus-G4">Nexus GPT-4</option>
        <option value="Nexus-C3">Nexus Claude 3</option>
        <option value="Nexus-G-Pro">Nexus Gemini Pro</option>
    </select>
</header>

<div id="chat-window">
    </div>

<div class="controls">
    <div id="status-bar">Analizando datos...</div>
    <div class="input-wrapper">
        <label for="file-input" class="icon-btn">📎</label>
        <input type="file" id="file-input" onchange="uploadFile()">
        
        <input type="text" id="user-input" placeholder="Mensaje..." autocomplete="off">
        
        <button class="icon-btn send-btn" onclick="handleSend()">↑</button>
    </div>
</div>

<script>
    const chatWin = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const modelSelect = document.getElementById('model-select');
    const statusBar = document.getElementById('status-bar');

    // --- LÓGICA DE PERSISTENCIA (LocalStorage) ---
    let history = JSON.parse(localStorage.getItem('nexus_chat')) || [
        { role: 'bot', content: 'Sistema NexusCore en línea. Protocolos móviles activos. ¿Qué deseas procesar?' }
    ];

    // Renderizar historial al cargar
    function renderChat() {
        chatWin.innerHTML = '';
        history.forEach(msg => {
            const div = document.createElement('div');
            div.className = `bubble ${msg.role}`;
            div.innerHTML = msg.content;
            chatWin.appendChild(div);
        });
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    function saveMessage(role, content) {
        history.push({ role, content });
        localStorage.setItem('nexus_chat', JSON.stringify(history));
        renderChat();
    }

    // --- ACCIONES ---
    function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        saveMessage('user', text);
        userInput.value = '';
        
        // Simular respuesta Pro
        statusBar.style.display = 'block';
        
        setTimeout(() => {
            statusBar.style.display = 'none';
            const modelName = modelSelect.value;
            const response = `[${modelName}] Procesamiento completado. He optimizado tu consulta basándome en los parámetros del modelo actual.`;
            saveMessage('bot', response);
        }, 1200);
    }

    function uploadFile() {
        const file = document.getElementById('file-input').files[0];
        if (file) {
            const fileHTML = `<div class="file-tag"><strong>📄 Archivo:</strong> ${file.name}</div>Análisis de integridad completado.`;
            saveMessage('user', `Subiendo archivo técnico...`);
            
            setTimeout(() => {
                saveMessage('bot', fileHTML);
            }, 1000);
        }
    }

    // Enter para enviar
    userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend() };

    // Inicializar
    renderChat();
</script>

</body>
</html>
