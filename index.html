<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexusCore AI | soyadrianyt001</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #030712; 
            --glass: rgba(11, 17, 33, 0.8); 
            --text: #f9fafb; 
            --border: rgba(255, 255, 255, 0.08); 
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }

        @keyframes auroraBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #0a0a0a, transparent);
            background-size: 200% 200%;
            animation: auroraBg 15s ease infinite;
            color: var(--text); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            position: relative;
        }

        /* --- Estilo del Creador Arriba --- */
        .creator-tag {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b;
            font-weight: 700;
            margin-top: 2px;
            display: block;
        }
        .creator-tag span { color: var(--primary); opacity: 0.8; }

        #big-welcome {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            z-index: 5;
            pointer-events: none;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes colorFlow {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        .welcome-title {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(90deg, #ffffff, #6366f1, #a855f7, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorFlow 6s linear infinite;
            margin-bottom: 8px;
            display: block;
            filter: drop-shadow(0 0 20px var(--primary-glow));
        }

        header { 
            padding: 15px 20px; 
            padding-top: calc(15px + env(safe-area-inset-top));
            background: var(--glass); 
            border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100;
        }

        .brand-container { display: flex; flex-direction: column; }
        .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--primary); }
        .brand::before { content: ''; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }
        
        .icon-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 8px; border-radius: 12px; display: flex; align-items: center; transition: 0.3s; }
        .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

        #settings-menu {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
            background: rgba(3, 7, 18, 0.98); border-left: 1px solid var(--border);
            z-index: 1000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            padding: 40px 25px; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }
        #settings-menu.open { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; z-index: 10; }
        
        .bubble { max-width: 85%; padding: 16px 20px; border-radius: 22px; font-size: 15px; line-height: 1.6; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bot { background: var(--glass); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .user { background: linear-gradient(135deg, #6366f1, #4338ca); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 10px 20px var(--primary-glow); }

        #loading-area { display: none; padding: 0 25px; margin-bottom: 15px; }
        .typing-bubble { display: inline-flex; align-items: center; gap: 6px; background: var(--glass); padding: 12px 18px; border-radius: 20px; border: 1px solid var(--border); }
        .dot { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        .input-area { 
            background: var(--glass); border-top: 1px solid var(--border); 
            padding: 15px 20px; padding-bottom: calc(15px + env(safe-area-inset-top)); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100;
        }

        .toolbar { display: flex; gap: 25px; margin-bottom: 12px; justify-content: flex-start; padding-left: 10px; opacity: 0.9; }

        .input-container { 
            background: rgba(0, 0, 0, 0.5); border-radius: 28px; display: flex; 
            padding: 6px 6px 6px 20px; align-items: center; 
            border: 1px solid var(--border); transition: 0.3s;
        }
        .input-container:focus-within { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; font-size: 16px; outline: none; }
        
        .mic-active { color: #ef4444; font-weight: 700; font-size: 10px; margin-right: 12px; display: none; animation: pulse 1s infinite; letter-spacing: 1px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .send-btn { 
            background: var(--primary); color: white; border: none; 
            width: 44px; height: 44px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; box-shadow: 0 4px 12px var(--primary-glow);
        }
        .send-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="settings-menu">
    <span style="font-weight: 700; font-size: 20px; margin-bottom: 30px; display: block;">Configuración</span>
    <div style="margin-bottom: 25px;">
        <label style="display: block; font-size: 10px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase;">Motor de IA</label>
        <select id="model-select" style="width: 100%; background: #030712; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 12px;">
            <option value="Nexus-V5">Nexus V5 (Neural Pro)</option>
            <option value="Nexus-V3">Nexus V3 (Estable)</option>
        </select>
    </div>
    <button onclick="clearChat()" style="width:100%; padding:14px; background:rgba(239, 68, 68, 0.1); border:1px solid #ef4444; color:#ef4444; border-radius:12px; cursor:pointer;">Borrar Memoria</button>
    <button onclick="toggleSettings()" style="width:100%; padding:16px; background:var(--primary); border:none; color:white; border-radius:16px; margin-top: 40px; font-weight:700; cursor:pointer;">Guardar</button>
</div>

<header>
    <div class="brand-container">
        <div class="brand">NEXUS<span>CORE</span></div>
        <span class="creator-tag">CREADOR: <span>SOYADRIANYT001</span></span>
    </div>
    <button class="icon-btn" onclick="toggleSettings()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
</header>

<div id="big-welcome">
    <span class="welcome-title" id="display-greet">Sincronizando...</span>
    <span style="font-size: 11px; color: #94a3b8; letter-spacing: 4px; text-transform: uppercase; font-weight: 600; opacity: 0.8;">Panel de Inteligencia Avanzada</span>
</div>

<div id="chat-window"></div>

<div id="loading-area">
    <div class="typing-bubble">
        <div class="dot"></div> <div class="dot"></div> <div class="dot"></div>
    </div>
</div>

<div class="input-area">
    <div class="toolbar">
        <label for="img-input" class="icon-btn" style="padding:0">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </label>
        <input type="file" id="img-input" hidden onchange="handleMedia('Imagen')">
        <label for="vid-input" class="icon-btn" style="padding:0">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        </label>
        <input type="file" id="vid-input" hidden onchange="handleMedia('Video')">
        <span class="icon-btn" style="padding:0" onclick="toggleMic()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
        </span>
    </div>

    <div class="input-container">
        <span id="mic-status" class="mic-active">● VOZ</span>
        <input type="text" id="user-input" placeholder="Pregunta algo a NexusCore..." autocomplete="off">
        <button class="send-btn" onclick="handleSend()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
    </div>
</div>

<script>
    const chatWin = document.getElementById('chat-window');
    const inputField = document.getElementById('user-input');
    const bigWelcome = document.getElementById('big-welcome');
    const displayGreet = document.getElementById('display-greet');
    const micStatus = document.getElementById('mic-status');

    function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }

    function toggleMic() {
        const isMicOn = micStatus.style.display === 'block';
        micStatus.style.display = isMicOn ? 'none' : 'block';
        inputField.placeholder = isMicOn ? "Pregunta algo a NexusCore..." : "Escuchando...";
    }

    function setBigGreeting() {
        const hora = new Date().getHours();
        let saludo = "¡Buenas noches!";
        if (hora >= 6 && hora < 12) saludo = "¡Buenos días!";
        else if (hora >= 12 && hora < 19) saludo = "¡Buenas tardes!";
        displayGreet.innerText = saludo;
    }

    function hideWelcome() {
        bigWelcome.style.opacity = "0";
        bigWelcome.style.transform = "translate(-50%, -60%) scale(0.9)";
        setTimeout(() => { bigWelcome.style.display = "none"; }, 800);
    }

    function handleMedia(type) {
        if(bigWelcome.style.display !== "none") hideWelcome();
        save('user', `Adjunto archivo de ${type} para análisis.`);
        document.getElementById('loading-area').style.display = 'block';
        setTimeout(() => {
            document.getElementById('loading-area').style.display = 'none';
            save('bot', `Análisis de ${type} completado.`);
        }, 1500);
    }

    async function handleSend() {
        const text = inputField.value.trim();
        if(!text) return;
        if(bigWelcome.style.display !== "none") hideWelcome();

        save('user', text);
        inputField.value = '';
        document.getElementById('loading-area').style.display = 'block';
        chatWin.scrollTop = chatWin.scrollHeight;

        // Simulación de respuesta si no están los archivos externos
        setTimeout(() => {
            document.getElementById('loading-area').style.display = 'none';
            save('bot', "Respuesta procesada correctamente por NexusCore.");
        }, 1000);
    }

    function save(role, content) {
        const history = JSON.parse(localStorage.getItem('nexus_ultra')) || [];
        history.push({role, content});
        localStorage.setItem('nexus_ultra', JSON.stringify(history));
        render();
    }

    function render() {
        const history = JSON.parse(localStorage.getItem('nexus_ultra')) || [];
        if(history.length > 0) bigWelcome.style.display = "none";
        chatWin.innerHTML = '';
        history.forEach(m => {
            const d = document.createElement('div');
            d.className = `bubble ${m.role}`;
            d.innerHTML = m.content;
            chatWin.appendChild(d);
        });
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    function clearChat() { localStorage.removeItem('nexus_ultra'); location.reload(); }
    inputField.onkeypress = (e) => { if(e.key === 'Enter') handleSend() };
    setBigGreeting();
    render();
</script>
</body>
</html>
