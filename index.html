<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Adrian AI</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:500px;
height:600px;
background:#020617;
border-radius:12px;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
text-align:center;
font-size:22px;
border-bottom:1px solid #1e293b;
}

.chat{
flex:1;
overflow:auto;
padding:15px;
}

.message{
padding:10px;
margin:6px 0;
border-radius:8px;
max-width:70%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1e293b;
}

.input{
display:flex;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:12px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:12px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
🐉 Adrian AI
</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="msg" placeholder="Escribe un mensaje">
<button onclick="send()">Enviar</button>
</div>

</div>

<script>

async function send(){

let text=document.getElementById("msg").value
if(!text) return

let chat=document.getElementById("chat")

let user=document.createElement("div")
user.className="message user"
user.innerText=text
chat.appendChild(user)

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

let bot=document.createElement("div")
bot.className="message bot"
bot.innerText=data.reply
chat.appendChild(bot)

document.getElementById("msg").value=""
chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
